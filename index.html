<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ExpoScan — 전시 서비스 카탈로그</title>
<style>
  :root{
    --accent:#4F46E5; --accent-hover:#4338CA; --accent-tint:#EEF0FF;
    --bg:#F7F8FA; --surface:#FFFFFF;
    --text:#18181B; --text-2:#52525B; --muted:#A1A1AA;
    --border:#E8E8ED; --border-2:#E4E4E7;
    --chip:#F4F4F5; --chip-text:#3F3F46;
    --danger:#DC2626;
    --radius:14px; --radius-sm:10px;
    --shadow-sm:0 1px 2px rgba(24,24,27,.05);
    --shadow-md:0 8px 28px rgba(24,24,27,.12);
    --font:-apple-system,"Pretendard","Apple SD Gothic Neo","Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,textarea,select{font-family:inherit;font-size:14px;color:var(--text)}
  ::selection{background:var(--accent-tint)}

  /* ---------- Top bar ---------- */
  .topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--border)}
  .topbar-inner{max-width:1240px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:16px}
  .brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .logo{width:30px;height:30px;border-radius:8px;background:var(--accent);display:grid;place-items:center;color:#fff;box-shadow:var(--shadow-sm)}
  .brand h1{font-size:16px;font-weight:700;letter-spacing:-.01em}
  .brand .sub{font-size:11px;color:var(--muted);font-weight:500;margin-top:-2px}
  .spacer{flex:1}
  .search{position:relative;flex:1;max-width:360px}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .search input{width:100%;height:38px;padding:0 12px 0 36px;border:1px solid var(--border-2);border-radius:999px;background:var(--surface);outline:none;transition:.15s}
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
  .iconbtn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;color:var(--text-2);border:1px solid var(--border-2);background:var(--surface);transition:.15s}
  .iconbtn:hover{background:var(--bg);color:var(--text)}
  .btn{height:38px;padding:0 16px;border-radius:10px;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:.15s;white-space:nowrap}
  .btn-primary{background:var(--accent);color:#fff;box-shadow:var(--shadow-sm)}
  .btn-primary:hover{background:var(--accent-hover)}
  .btn-ghost{background:var(--surface);color:var(--text-2);border:1px solid var(--border-2)}
  .btn-ghost:hover{background:var(--bg);color:var(--text)}
  .btn-danger{background:#fff;color:var(--danger);border:1px solid #F3C9C9}
  .btn-danger:hover{background:#FEF2F2}

  /* ---------- Layout ---------- */
  .wrap{max-width:1240px;margin:0 auto;padding:24px}
  .filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:20px}
  .count{font-size:13px;color:var(--muted);font-weight:500;margin-right:4px}
  .chip{height:30px;padding:0 13px;border-radius:999px;font-size:13px;font-weight:500;background:var(--chip);color:var(--chip-text);border:1px solid transparent;transition:.12s}
  .chip:hover{background:#ECECEF}
  .chip.active{background:var(--accent);color:#fff}

  /* ---------- Grid / cards ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(264px,1fr));gap:16px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:.18s;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:#DEDEE3}
  .card-img{height:148px;background:var(--bg);position:relative;overflow:hidden}
  .card-img img{width:100%;height:100%;object-fit:cover;display:block}
  .card-ph{width:100%;height:100%;display:grid;place-items:center;font-size:40px;font-weight:800;color:#fff;letter-spacing:-.02em}
  .card-cat{position:absolute;top:10px;left:10px;height:24px;padding:0 9px;border-radius:7px;background:rgba(255,255,255,.92);backdrop-filter:blur(4px);color:var(--accent);font-size:11px;font-weight:700;display:inline-flex;align-items:center}
  .card-body{padding:14px 15px 15px;display:flex;flex-direction:column;flex:1}
  .card-name{font-size:15px;font-weight:700;letter-spacing:-.01em;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .card-one{font-size:13px;color:var(--text-2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:39px}
  .card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:11px}
  .tag{font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;background:var(--chip);color:var(--chip-text)}
  .card-foot{margin-top:12px;padding-top:11px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted)}
  .card-foot .who{display:flex;align-items:center;gap:5px;font-weight:500}
  .avatar{width:18px;height:18px;border-radius:50%;background:var(--accent-tint);color:var(--accent);display:grid;place-items:center;font-size:9px;font-weight:700}

  /* ---------- Empty ---------- */
  .empty{text-align:center;padding:80px 24px;color:var(--muted)}
  .empty .ic{width:64px;height:64px;border-radius:18px;background:var(--surface);border:1px solid var(--border);display:grid;place-items:center;margin:0 auto 18px;color:var(--accent)}
  .empty h2{font-size:18px;color:var(--text);font-weight:700;margin-bottom:8px}
  .empty p{font-size:14px;max-width:380px;margin:0 auto 22px;line-height:1.6}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;z-index:50;background:rgba(24,24,27,.42);backdrop-filter:blur(2px);display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:18px;width:100%;max-width:580px;box-shadow:var(--shadow-md);animation:pop .18s ease;margin:auto}
  .modal.wide{max-width:680px}
  @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.99)}to{opacity:1;transform:none}}
  .modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .modal-head h3{font-size:17px;font-weight:700;letter-spacing:-.01em}
  .modal-head .x{width:32px;height:32px;border-radius:8px;color:var(--muted);display:grid;place-items:center}
  .modal-head .x:hover{background:var(--bg);color:var(--text)}
  .modal-body{padding:22px 24px}
  .modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}

  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:7px;color:var(--text)}
  .field .hint{font-weight:400;color:var(--muted);font-size:12px}
  .field input[type=text],.field input[type=url],.field input[type=password],.field textarea,.field select{
    width:100%;padding:10px 12px;border:1px solid var(--border-2);border-radius:var(--radius-sm);background:var(--surface);outline:none;transition:.15s}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
  .field textarea{resize:vertical;min-height:84px;line-height:1.55}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  /* image picker */
  .imgpick{display:flex;gap:12px;align-items:flex-start}
  .imgdrop{width:120px;height:90px;border:1.5px dashed var(--border-2);border-radius:var(--radius-sm);display:grid;place-items:center;color:var(--muted);font-size:12px;text-align:center;cursor:pointer;background:var(--bg);overflow:hidden;flex-shrink:0;transition:.15s}
  .imgdrop:hover{border-color:var(--accent);color:var(--accent)}
  .imgdrop.dragover{border-color:var(--accent);border-style:solid;background:var(--accent-tint);color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
  .imgdrop img{width:100%;height:100%;object-fit:cover}
  .imgpick .col{flex:1}

  .ai-bar{display:flex;align-items:center;gap:10px;padding:12px 14px;background:linear-gradient(90deg,var(--accent-tint),#F5F3FF);border:1px solid #E0E0FB;border-radius:var(--radius-sm);margin-bottom:18px}
  .ai-bar .txt{flex:1;font-size:12.5px;color:#4338CA;font-weight:500;line-height:1.4}
  .ai-bar .btn{height:34px}
  .spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.45);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite;display:inline-block}
  @keyframes rot{to{transform:rotate(360deg)}}

  /* ---------- Detail ---------- */
  .d-hero{height:200px;background:var(--bg);position:relative}
  .d-hero img{width:100%;height:100%;object-fit:cover}
  .d-hero .d-ph{width:100%;height:100%;display:grid;place-items:center;font-size:64px;font-weight:800;color:#fff}
  .d-body{padding:24px}
  .d-cat{display:inline-flex;height:26px;padding:0 11px;align-items:center;border-radius:8px;background:var(--accent-tint);color:var(--accent);font-size:12px;font-weight:700;margin-bottom:12px}
  .d-name{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
  .d-one{font-size:15px;color:var(--text-2);line-height:1.55;margin-bottom:18px}
  .d-sect{margin-bottom:20px}
  .d-sect h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:9px}
  .d-sect p{font-size:14.5px;color:var(--text);line-height:1.65;white-space:pre-wrap}
  .d-points{list-style:none;display:flex;flex-direction:column;gap:8px}
  .d-points li{font-size:14px;color:var(--text);line-height:1.55;padding-left:22px;position:relative}
  .d-points li::before{content:"";position:absolute;left:4px;top:8px;width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .d-tags{display:flex;flex-wrap:wrap;gap:7px}
  .d-link{display:inline-flex;align-items:center;gap:7px;height:40px;padding:0 16px;border-radius:10px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;text-decoration:none;transition:.15s}
  .d-link:hover{background:var(--accent-hover)}
  .d-meta{font-size:12px;color:var(--muted);margin-top:18px;padding-top:16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}

  .toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;gap:8px;align-items:center}
  .toast{background:#18181B;color:#fff;font-size:13px;font-weight:500;padding:11px 18px;border-radius:10px;box-shadow:var(--shadow-md);animation:pop .2s ease}
  .toast.err{background:var(--danger)}

  .help{font-size:12.5px;color:var(--text-2);background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;line-height:1.6;margin-top:4px}
  .help a{color:var(--accent);font-weight:600;text-decoration:none}
  a.link{color:var(--accent);text-decoration:none;font-weight:600}

  @media (max-width:640px){
    .topbar-inner{flex-wrap:wrap}
    .search{order:3;max-width:none;flex-basis:100%}
    .brand h1{font-size:15px}
    .btn-label{display:none}
    .btn{padding:0 12px}
    .row2{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="logo">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><path d="M14 17.5h7M17.5 14v7"/></svg>
      </div>
      <div>
        <h1>ExpoScan</h1>
        <div class="sub">ISTE 서비스 카탈로그</div>
      </div>
    </div>

    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="회사·서비스·태그 검색…" autocomplete="off" />
    </div>

    <div class="spacer"></div>

    <button class="iconbtn" id="btnImport" title="가져오기 (JSON)">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m8 11 4 4 4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
    </button>
    <button class="iconbtn" id="btnExport" title="내보내기 (JSON)">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="m8 7 4-4 4 4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
    </button>
    <button class="iconbtn" id="btnSettings" title="설정">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <button class="btn btn-primary" id="btnAdd">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      <span class="btn-label">서비스 추가</span>
    </button>
  </div>
</header>

<main class="wrap">
  <div class="filters" id="filters"></div>
  <div id="content"></div>
</main>

<!-- ADD / EDIT MODAL -->
<div class="overlay" id="formOverlay">
  <div class="modal wide">
    <div class="modal-head">
      <h3 id="formTitle">서비스 추가</h3>
      <button class="x" data-close="formOverlay">✕</button>
    </div>
    <div class="modal-body">
      <div class="ai-bar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4338CA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 13.9 8.1 19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z"/><path d="M19 14v4M21 16h-4M5 4v2M6 5H4"/></svg>
        <div class="txt">이미지·URL·메모를 넣고 <b>AI 분석</b>을 누르면 요약·핵심·태그가 자동으로 채워져요. (수정 가능)</div>
        <button class="btn btn-primary" id="btnAnalyze">
          <span id="analyzeLabel">AI 분석</span>
        </button>
      </div>

      <div class="field">
        <label>이미지 <span class="hint">— 부스 사진 / 제품 화면 / 로고 (드래그&드롭 · 클릭 업로드 · 이미지 URL)</span></label>
        <div class="imgpick">
          <label class="imgdrop" id="imgDrop">
            <input type="file" id="imgFile" accept="image/*" hidden />
            <span id="imgDropTxt">＋ 업로드</span>
          </label>
          <div class="col">
            <input type="url" id="fImgUrl" placeholder="또는 이미지 URL 붙여넣기 (https://…)" />
            <div class="hint" style="margin-top:7px;font-size:11.5px;color:var(--muted)">업로드한 사진은 자동으로 압축되어 브라우저에 저장됩니다.</div>
          </div>
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label>회사 / 서비스명 <span class="hint">(비워두면 AI가 추정)</span></label>
          <input type="text" id="fCompany" placeholder="예: Kahoot!" />
        </div>
        <div class="field">
          <label>웹사이트 URL</label>
          <input type="url" id="fUrl" placeholder="https://…" />
        </div>
      </div>

      <div class="field">
        <label>메모 <span class="hint">— 부스에서 보고 들은 내용, 특징, 가격 등 자유롭게</span></label>
        <textarea id="fMemo" placeholder="예: 게임형 퀴즈 플랫폼. 실시간 참여, 교사용 리포트 제공. 학교 단위 라이선스…"></textarea>
      </div>

      <details>
        <summary style="cursor:pointer;font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:10px">AI 결과 직접 편집 ▾</summary>
        <div class="field"><label>한 줄 핵심</label><input type="text" id="fOne" placeholder="한 문장 요약" /></div>
        <div class="field"><label>요약</label><textarea id="fSummary" placeholder="2~4문장 요약"></textarea></div>
        <div class="row2">
          <div class="field"><label>카테고리</label><input type="text" id="fCategory" placeholder="예: 평가/퀴즈" /></div>
          <div class="field"><label>태그 <span class="hint">(쉼표로 구분)</span></label><input type="text" id="fTags" placeholder="게이미피케이션, 실시간, K-12" /></div>
        </div>
        <div class="field"><label>핵심 포인트 <span class="hint">(한 줄에 하나씩)</span></label><textarea id="fPoints" placeholder="실시간 퀴즈로 참여 유도&#10;교사용 성취도 리포트&#10;무료 + 학교 라이선스"></textarea></div>
      </details>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" data-close="formOverlay">취소</button>
      <button class="btn btn-primary" id="btnSave">저장</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detailOverlay">
  <div class="modal">
    <div class="modal-head">
      <h3>서비스 상세</h3>
      <button class="x" data-close="detailOverlay">✕</button>
    </div>
    <div id="detailContent"></div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <div class="modal-head">
      <h3>설정</h3>
      <button class="x" data-close="settingsOverlay">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>내 이름 <span class="hint">— 카드에 '추가한 사람'으로 표시</span></label>
        <input type="text" id="sName" placeholder="예: 김민수" />
      </div>
      <div class="field">
        <label>AI 모델</label>
        <select id="sModel">
          <option value="claude-sonnet-4-6">Sonnet 4.6 — 균형 (추천)</option>
          <option value="claude-haiku-4-5-20251001">Haiku 4.5 — 빠르고 저렴</option>
          <option value="claude-opus-4-8">Opus 4.8 — 최고 품질</option>
        </select>
      </div>
      <div class="help">
        🤖 AI 요약은 <b>공용 키로 서버에서 처리</b>되므로 별도 키 입력이 필요 없어요.<br>
        이름은 카드에 '추가한 사람'으로 표시되며, 이 브라우저에만 저장됩니다.
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" data-close="settingsOverlay">취소</button>

function onImgFile(e){

function fileToDataURL(file,maxDim=1280,q=.82){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>{const img=new Image();img.onload=()=>{
      let{width:w,height:h}=img;if(Math.max(w,h)>maxDim){const s=maxDim/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s)}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
      res(cv.toDataURL('image/jpeg',q))};img.onerror=rej;img.src=e.target.result};
    r.onerror=rej;r.readAsDataURL(file);
  });
}

/* ---- 이미지 드래그 앤 드롭 (앨범/파인더의 파일 · 다른 창의 이미지 URL) ---- */
function dtHasDraggable(e){const t=e.dataTransfer&&e.dataTransfer.types;if(!t)return false;const a=Array.from(t);return a.includes('Files')||a.includes('text/uri-list')}
function setDropHighlight(on){
  const box=document.getElementById('imgDrop');if(box)box.classList.toggle('dragover',on);
  const txt=document.getElementById('imgDropTxt');if(txt)txt.textContent=on?'여기에 놓기':'＋ 업로드';
}
function handleDrop(dt){
  if(dt.files&&dt.files.length){
    const f=Array.from(dt.files).find(x=>x.type.startsWith('image/'));
    if(f){fileToDataURL(f).then(d=>{currentImage=d;setVal('fImgUrl','');renderImgPreview();toast('이미지를 추가했어요')}).catch(()=>toast('이미지를 읽지 못했습니다',true));return}
    toast('이미지 파일을 놓아주세요',true);return;
  }
  const raw=(dt.getData&&(dt.getData('text/uri-list')||dt.getData('text/plain')))||'';
  const url=raw.split(/\s+/).map(s=>s.trim()).find(s=>/^https?:\/\//i.test(s)&&!s.startsWith('#'));
  if(url){currentImage='';setVal('fImgUrl',url);renderImgPreview();toast('이미지 URL을 추가했어요');return}
  toast('이미지 파일이나 이미지 URL을 놓아주세요',true);
}
function setupDropZone(){
  const modal=document.querySelector('#formOverlay .modal');if(!modal)return;
  let depth=0;
  modal.addEventListener('dragenter',e=>{if(!dtHasDraggable(e))return;e.preventDefault();depth++;setDropHighlight(true)});
  modal.addEventListener('dragover',e=>{if(!dtHasDraggable(e))return;e.preventDefault();e.dataTransfer.dropEffect='copy'});
  modal.addEventListener('dragleave',e=>{if(!dtHasDraggable(e))return;depth=Math.max(0,depth-1);if(!depth)setDropHighlight(false)});
  modal.addEventListener('drop',e=>{e.preventDefault();depth=0;setDropHighlight(false);if(e.dataTransfer)handleDrop(e.dataTransfer)});
  // 폼 밖에 떨어뜨렸을 때 브라우저가 이미지를 열어버리는 기본 동작 차단
  window.addEventListener('dragover',e=>{if(dtHasDraggable(e))e.preventDefault()});
  window.addEventListener('drop',e=>{if(dtHasDraggable(e))e.preventDefault()});
}

async function saveService(){
  if(!sb){toast('Supabase가 연결되지 않았습니다',true);return}
  const company=getVal('fCompany');
  const image=currentImage||getVal('fImgUrl');
  const tags=getVal('fTags').split(',').map(t=>t.trim()).filter(Boolean);
  const keyPoints=getVal('fPoints').split('\n').map(t=>t.trim()).filter(Boolean);
  if(!company && !getVal('fMemo') && !getVal('fUrl') && !image){toast('내용을 하나 이상 입력해 주세요',true);return}
  const now=new Date().toISOString();
  const data={company,url:getVal('fUrl'),image,memo:getVal('fMemo'),oneLiner:getVal('fOne'),
    summary:getVal('fSummary'),category:getVal('fCategory'),tags,keyPoints};
  const wasEditing=!!editingId;
  let svc;
  if(wasEditing){
    const cur=services.find(s=>s.id===editingId)||{};
    svc={...cur,...data,id:editingId,updatedAt:now};
  }else{
    svc={id:uid(),...data,addedBy:settings.name||'',createdAt:now,updatedAt:now};
  }
  const btn=document.getElementById('btnSave');btn.disabled=true;
  try{
    await dbUpsert(svc);
    const i=services.findIndex(s=>s.id===svc.id);
    if(i>=0)services[i]=svc;else services.unshift(svc);
    close('formOverlay');render();
    toast(wasEditing?'수정되었습니다':'추가되었습니다');
  }catch(e){toast('저장 실패: '+(e.message||e),true)}
  finally{btn.disabled=false}
}

/* ============ Claude AI ============ */
async function analyze(){
  const company=getVal('fCompany'),url=getVal('fUrl'),memo=getVal('fMemo');
  const image=currentImage||getVal('fImgUrl');
  if(!company&&!url&&!memo&&!image){toast('이미지·URL·메모 중 하나는 입력해 주세요',true);return}

  const btn=document.getElementById('btnAnalyze'),lbl=document.getElementById('analyzeLabel');
  btn.disabled=true;lbl.innerHTML='<span class="spin"></span>';

  const prompt=`너는 에듀테크(교육기술) 전시회 참관 기록을 정리하는 분석가야. 아래 정보를 바탕으로 이 교육 서비스/회사를 분석해줘.
- 회사/서비스명(추정 가능): ${company||'(미상)'}
- 웹사이트 URL: ${url||'(없음)'}
- 참관 메모: ${memo||'(없음)'}
${image?'- 첨부 이미지(부스/제품화면/로고/슬라이드)도 반드시 분석에 반영해줘.':''}

규칙:
- 모든 값은 한국어로 작성.
- 메모/이미지/URL/회사명으로 알 수 있는 범위에서 작성하고, 불확실하면 과장하지 말 것.
- oneLiner: 20자~40자 내외의 한 줄 핵심.
- summary: 2~4문장. 무엇을 하는 서비스이고 누구를 위한 것인지.
- category: 짧은 분류 1개 (예: LMS, AI튜터, 평가/퀴즈, VR/AR, 코딩교육, 콘텐츠, 학교운영, 특수교육 등).
- tags: 3~6개의 짧은 키워드 배열.
- keyPoints: 3~5개의 핵심 특징 배열.

반드시 아래 JSON 형식만 출력하고 다른 말은 절대 쓰지 마:
{"company":"","oneLiner":"","summary":"","category":"","tags":[],"keyPoints":[]}`;

  const content=[{type:'text',text:prompt}];
  if(image){
    if(image.startsWith('data:')){
      const [meta,b64]=image.split(',');const mt=(meta.match(/data:(.*?);/)||[])[1]||'image/jpeg';
      content.push({type:'image',source:{type:'base64',media_type:mt,data:b64}});
    }else if(/^https?:/.test(image)){
      content.push({type:'image',source:{type:'url',url:image}});
    }
  }

  try{
    const r=await fetch('/api/analyze',{
      method:'POST',
      headers:{'content-type':'application/json'},
      body:JSON.stringify({model:settings.model||'claude-sonnet-4-6',max_tokens:1024,messages:[{role:'user',content}]})
    });
    const data=await r.json();
    if(!r.ok){throw new Error('('+r.status+') '+((data&&data.error)||'요청 실패'))}
    const out=(data.content||[]).map(c=>c.text||'').join('');
    const j=parseJSON(out);
    if(!j)throw new Error('응답을 해석하지 못했어요');
    if(j.company&&!getVal('fCompany'))setVal('fCompany',j.company);
    if(j.oneLiner)setVal('fOne',j.oneLiner);
    if(j.summary)setVal('fSummary',j.summary);
    if(j.category)setVal('fCategory',j.category);
    if(Array.isArray(j.tags))setVal('fTags',j.tags.join(', '));
    if(Array.isArray(j.keyPoints))setVal('fPoints',j.keyPoints.join('\n'));
    document.querySelector('#formOverlay details').open=true;
    toast('AI 분석 완료 ✨');
  }catch(e){
    console.error(e);
    let m=e.message||'분석 실패';
    if(/401|authentication|ANTHROPIC_API_KEY/i.test(m))m='서버 API 키 설정에 문제가 있어요. 관리자에게 문의해 주세요.';
    else if(/429/.test(m))m='요청이 많아요. 잠시 후 다시 시도해 주세요.';
    else if(/Failed to fetch|NetworkError/i.test(m))m='네트워크 오류 — 인터넷 연결을 확인해 주세요.';
    toast(m,true);
  }finally{btn.disabled=false;lbl.textContent='AI 분석'}
}
function parseJSON(t){
  if(!t)return null;
  let s=t.replace(/```json/gi,'').replace(/```/g,'').trim();
  const a=s.indexOf('{'),b=s.lastIndexOf('}');
  if(a>=0&&b>a)s=s.slice(a,b+1);
  try{return JSON.parse(s)}catch(e){return null}
}

/* ============ Export / Import ============ */
function exportJSON(){
  if(!services.length){toast('내보낼 서비스가 없어요',true);return}
  const blob=new Blob([JSON.stringify(services,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  const d=new Date();const stamp=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  a.href=url;a.download=`exposcan-${stamp}.json`;a.click();URL.revokeObjectURL(url);
  toast(`${services.length}개 서비스를 내보냈어요`);
}
function importJSON(file){
  if(!sb){toast('Supabase가 연결되지 않았습니다',true);return}
  const r=new FileReader();
  r.onload=async e=>{
    try{
      const arr=JSON.parse(e.target.result);
      if(!Array.isArray(arr))throw 0;
      let n=0;
      for(const it of arr){
        if(!it||typeof it!=='object')continue;
        const s={...it,id:it.id||uid(),updatedAt:it.updatedAt||new Date().toISOString()};
        await dbUpsert(s);n++;
      }
      await refresh();
      toast(`가져오기 완료 — ${n}개를 공용 목록에 반영했어요`);
    }catch(err){toast('가져오기 실패: 올바른 JSON인지 확인해 주세요',true)}
  };
  r.readAsText(file);
}

/* ============ Settings ============ */
function openSettings(){setVal('sName',settings.name);document.getElementById('sModel').value=settings.model||'claude-sonnet-4-6';show('settingsOverlay')}
function saveSettings(){
  settings={name:getVal('sName'),model:document.getElementById('sModel').value};
  save(LS_SET,settings);close('settingsOverlay');toast('설정이 저장되었습니다');
}

/* ============ Modal helpers ============ */
function show(id){document.getElementById(id).classList.add('open')}
function close(id){document.getElementById(id).classList.remove('open')}
document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>close(b.dataset.close));
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('mousedown',e=>{if(e.target===o)close(o.id)}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.overlay.open').forEach(o=>close(o.id))});

/* ============ Wire up ============ */
document.getElementById('btnAdd').onclick=openForm;
document.getElementById('btnSave').onclick=saveService;
document.getElementById('btnAnalyze').onclick=analyze;
document.getElementById('btnSettings').onclick=openSettings;
document.getElementById('btnSaveSettings').onclick=saveSettings;
document.getElementById('btnExport').onclick=exportJSON;
document.getElementById('btnImport').onclick=()=>document.getElementById('importFile').click();
document.getElementById('importFile').onchange=e=>{if(e.target.files[0])importJSON(e.target.files[0]);e.target.value=''};
document.getElementById('imgFile').onchange=onImgFile;
document.getElementById('fImgUrl').oninput=()=>{currentImage='';renderImgPreview()};
document.getElementById('search').oninput=e=>{query=e.target.value;render()};

setupDropZone();
render();
if(CONFIGURED){refresh();subscribeRealtime();}
else{showConfigBanner();}
</script>
